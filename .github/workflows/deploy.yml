name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]   # PRs run the same checks + build, but never deploy
  schedule:
    - cron: '0 6 * * *'   # daily — re-pull Letterboxd / Steam / PSN / Substack and redeploy
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Per-ref groups: PR builds get their own lane and can never cancel an in-flight
# main deploy; pushes/cron/dispatch on main still serialize with each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Restore the previous run's pulled JSON so scripts/pull.mjs "keep last good"
      # has something to keep on a clean checkout (src/generated/*.json is gitignored).
      # The unique key never hits, so restore-keys picks the most recent save and the
      # post-job step saves this run's fresh data under the new key.
      - name: Restore last-good fed data
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: src/generated/*.json
          key: fed-data-${{ github.run_id }}
          restore-keys: |
            fed-data-

      - name: Type check
        run: npx astro check

      # Deterministic static assets (ASCII banner + OG share image) — regenerated every
      # build so a name/tagline change can't ship a stale og.png.
      - name: Generate banner + OG image
        run: node scripts/generate.mjs

      - name: Build
        run: npm run build
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          PSN_NPSSO: ${{ secrets.PSN_NPSSO }}
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
